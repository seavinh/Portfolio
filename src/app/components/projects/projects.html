<section id="projects" class="projects section-padding">
    <div class="container">
        <h2 class="section-title text-center reveal">Featured <span class="gradient-text">Projects</span></h2>

        <div class="projects-grid">
            @for (project of projects; track project.title) {
            <div class="project-card glass reveal">
                <div class="project-image">
                    <img [src]="project.imageUrl" [alt]="project.title">
                </div>
                <div class="project-info">
                    <h3>{{ project.title }}</h3>
                    <p>{{ project.description }}</p>
                    <div class="tech-stack">
                        @for (tech of project.techs; track tech) {
                        <span class="tech-tag">{{ tech }}</span>
                        }
                    </div>
                    <div class="project-links">
                        <a [href]="project.demo" class="btn btn-primary btn-small">Live Demo <span
                                class="material-symbols-rounded">open_in_new</span></a>
                        <a href="https://github.com/seavinh" class="btn btn-outline btn-small">GitHub <span
                                class="material-symbols-rounded">code</span></a>
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</section>
